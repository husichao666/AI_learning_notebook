<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>并行训练学习手册 · Distributed Training Parallelism</title>
<style>
  :root{
    --bg:#0f1117; --panel:#161922; --panel2:#1c2030; --text:#d7dbe4; --muted:#9aa3b2;
    --accent:#7c93ff; --accent2:#4ade80; --border:#262b3a; --sidebar:300px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; height:100vh; overflow:hidden;
  }
  /* ---------- Sidebar ---------- */
  aside{
    width:var(--sidebar); flex-shrink:0; height:100%; overflow-y:auto;
    background:linear-gradient(180deg,#13161f,#0f1117); border-right:1px solid var(--border);
    padding:0 0 40px;
  }
  .brand{ padding:22px 22px 16px; border-bottom:1px solid var(--border); position:sticky; top:0;
          background:#13161f; z-index:2; }
  .brand .logo{ font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); }
  .brand h1{ font-size:1.18rem; margin:8px 0 4px; line-height:1.3; }
  .brand p{ margin:0; font-size:12.5px; color:var(--muted); }
  nav{ padding:14px 12px 0; }
  .navitem{
    display:block; text-decoration:none; color:var(--text); border:1px solid transparent;
    border-radius:10px; padding:10px 12px; margin:3px 0; position:relative; transition:.15s;
  }
  .navitem:hover{ background:var(--panel); border-color:var(--border); }
  .navitem.active{ background:var(--panel2); border-color:var(--accent); }
  .navitem .t{ display:block; font-size:14px; font-weight:600; }
  .navitem.sub .t{ font-weight:500; color:#aeb6c7; font-size:13px; }
  .navitem .s{ display:block; font-size:11.5px; color:var(--muted); margin-top:2px; }
  .navitem .badge{ position:absolute; right:10px; top:11px; font-size:11px; }
  .navitem .badge.wip{ color:#fbbf24; }
  .navitem .badge.done{ color:var(--accent2); }
  .grp{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#6b7385;
        padding:14px 14px 4px; }
  /* ---------- Main ---------- */
  main{ flex:1; display:flex; flex-direction:column; min-width:0; }
  .topbar{
    height:52px; flex-shrink:0; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:14px; padding:0 18px; background:var(--panel);
  }
  .topbar .crumb{ font-weight:600; font-size:14.5px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .topbar button, .topbar a.btn{
    background:var(--panel2); color:var(--text); border:1px solid var(--border); border-radius:8px;
    padding:6px 12px; font-size:13px; cursor:pointer; text-decoration:none; white-space:nowrap;
  }
  .topbar button:hover, .topbar a.btn:hover{ border-color:var(--accent); color:#fff; }
  .topbar button:disabled{ opacity:.35; cursor:not-allowed; }
  #hamburger{ display:none; }
  iframe{ flex:1; width:100%; border:0; background:var(--bg); }
  /* ---------- Mobile ---------- */
  .scrim{ display:none; }
  @media (max-width:820px){
    aside{ position:fixed; left:0; top:0; z-index:30; transform:translateX(-100%); transition:transform .2s; box-shadow:0 0 40px rgba(0,0,0,.5); }
    body.nav-open aside{ transform:translateX(0); }
    body.nav-open .scrim{ display:block; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:20; }
    #hamburger{ display:inline-flex; }
  }
</style>
</head>
<body>
  <aside>
    <div class="brand">
      <div class="logo">Handbook</div>
      <h1>并行训练学习手册</h1>
      <p>DP · FSDP · TP · PP · CP · EP — 由浅入深，对照 torchtitan / Megatron-LM 源码</p>
    </div>
    <nav id="nav"></nav>
  </aside>
  <div class="scrim" onclick="document.body.classList.remove('nav-open')"></div>

  <main>
    <div class="topbar">
      <button id="hamburger" onclick="document.body.classList.toggle('nav-open')">☰</button>
      <span class="crumb" id="crumb">…</span>
      <button id="prev" title="上一章">← 上一章</button>
      <button id="next" title="下一章">下一章 →</button>
      <a class="btn" id="open" target="_blank" rel="noopener" title="在新标签页打开本章">↗ 新窗口</a>
    </div>
    <iframe id="frame" title="章节内容"></iframe>
  </main>

<script>
  const CH = [
    { id:'foundations', grp:'入门', title:'M0 · 基础铺垫',     sub:'显存账本 + 通信原语',        path:'00-foundations/index.html', status:'wip' },
    { id:'dp',          grp:'数据维', title:'M1 · 数据并行 DP',  sub:'复制模型，切数据',          path:'01-dp/index.html',          status:'wip' },
    { id:'fsdp',        grp:'数据维', title:'M2 · FSDP / ZeRO',  sub:'切优化器 / 梯度 / 参数',    path:'02-fsdp/index.html',        status:'wip' },
    { id:'tp',          grp:'模型维', title:'M3 · 张量并行 TP+SP', sub:'切层内',                  path:'03-tp/index.html',          status:'wip' },
    { id:'loss',        grp:'模型维', title:'词表并行交叉熵',     sub:'TP 深入 · loss parallel',  path:'loss_parallel/index.html',  status:'done', sub_item:true },
    { id:'pp',          grp:'模型维', title:'M4 · 流水线并行 PP', sub:'切层间，1F1B',             path:'04-pp/index.html',          status:'wip' },
    { id:'cp',          grp:'序列/专家维', title:'M5 · 上下文并行 CP', sub:'切序列，Ring Attention', path:'05-cp/index.html',          status:'wip' },
    { id:'ep',          grp:'序列/专家维', title:'M6 · 专家并行 EP',   sub:'MoE，all-to-all',        path:'06-ep/index.html',          status:'wip' },
    { id:'auxloss',     grp:'序列/专家维', title:'MoE 负载均衡 aux_loss', sub:'EP 深入 · mindformers vs Megatron', path:'moe_aux_loss/index.html', status:'done', sub_item:true },
    { id:'nd',          grp:'综合', title:'M7 · nD 组合 + 工程', sub:'DeviceMesh，选型决策',     path:'07-nd/index.html',          status:'wip' },
  ];
  const frame=document.getElementById('frame'), navEl=document.getElementById('nav'),
        crumb=document.getElementById('crumb'), prevB=document.getElementById('prev'),
        nextB=document.getElementById('next'), openA=document.getElementById('open');

  function renderNav(){
    let html='', lastGrp=null;
    CH.forEach(c=>{
      if(c.grp!==lastGrp){ html+=`<div class="grp">${c.grp}</div>`; lastGrp=c.grp; }
      html+=`<a class="navitem ${c.sub_item?'sub':''}" data-id="${c.id}" href="#/${c.id}">
        <span class="t">${c.sub_item?'└ ':''}${c.title}</span>
        <span class="s">${c.sub}</span>
        <span class="badge ${c.status}">${c.status==='done'?'✓ 已发布':'🚧'}</span>
      </a>`;
    });
    navEl.innerHTML=html;
  }
  function curIdx(){
    const m=location.hash.match(/^#\/(.+)$/);
    const i=m?CH.findIndex(c=>c.id===m[1]):-1;
    return i<0?0:i;
  }
  function go(){
    const i=curIdx(), c=CH[i];
    if(frame.getAttribute('src')!==c.path) frame.src=c.path;
    crumb.textContent=c.title;
    openA.href=c.path;
    document.querySelectorAll('.navitem').forEach(a=>a.classList.toggle('active',a.dataset.id===c.id));
    prevB.disabled=(i===0); nextB.disabled=(i===CH.length-1);
    prevB.onclick=()=>{ if(i>0) location.hash='#/'+CH[i-1].id; };
    nextB.onclick=()=>{ if(i<CH.length-1) location.hash='#/'+CH[i+1].id; };
    document.body.classList.remove('nav-open');
    document.title='并行手册 · '+c.title;
  }
  window.addEventListener('hashchange',go);
  renderNav();
  if(!location.hash) location.replace('#/foundations');
  go();
</script>
</body>
</html>
